<mat-card>
    <mat-card-header class="d-flex justify-content-center">
        <mat-card-title>Sign in</mat-card-title>
    </mat-card-header>
    <div class="d-flex justify-content-center">
        <mat-card-content class="col-md-6">
            <form class="d-flex flex-column gap-4" [formGroup]="this.signInForm" (ngSubmit)="onSubmit()">
                <div class="d-flex flex-column">
                    <mat-form-field appearance="outline">
                        <mat-label>Username</mat-label>
                        <input matInput formControlName="username">
                        <mat-icon matSuffix>sentiment_very_satisfied</mat-icon>
                    </mat-form-field>
                    @if (errorMessages["username"]) {
                    <mat-error>{{ errorMessages["username"] }}</mat-error>
                    }
                </div>
                <div class="d-flex flex-column">
                    <mat-form-field appearance="outline">
                        <mat-label>Enter your password</mat-label>
                        <input matInput [type]="hide ? 'password' : 'text'" formControlName="password">
                        <button mat-icon-button matSuffix (click)="clickEvent($event)"
                            [attr.aria-label]="'Hide password'" [attr.aria-pressed]="hide">
                            <mat-icon>{{hide ? 'visibility_off' : 'visibility'}}</mat-icon>
                        </button>
                    </mat-form-field>
                    @if (errorMessages["password"]) {
                    <mat-error>{{ errorMessages["password"] }}</mat-error>
                    }
                    <a class="mt-3">Forgot password?</a>
                </div>
                <button mat-raised-button
                        class="py-4" 
                        color="primary" 
                        [disabled]="this.signInForm.invalid">
                    Sign in
                </button>
                <a class="align-self-center">Don't have an account? Sign up</a>
            </form>
        </mat-card-content>
    </div>
</mat-card>
